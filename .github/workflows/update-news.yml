name: Update Bangla Voice News Daily

# ─────────────────────────────────────────────────────────────
#  This runs the news updater automatically and republishes the
#  site to GitHub Pages — completely free.
#  • Runs every day (and you can also run it manually).
#  • No server, no cost.
# ─────────────────────────────────────────────────────────────

on:
  schedule:
    # Runs daily. Times are in UTC.
    # 00:00 UTC = 6:00 AM Bangladesh time. Add more lines for more updates/day.
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:        # lets you press a "Run" button manually
  push:
    branches: [ main ]      # also rebuild when you push changes

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch latest news -> news.json
        run: python update_news.py

      - name: Commit updated news.json
        run: |
          git config user.name  "Bangla Voice Bot"
          git config user.email "bot@users.noreply.github.com"
          git add news.json
          git commit -m "Auto-update news ($(date -u '+%Y-%m-%d %H:%M UTC'))" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Upload site for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # publishes the whole folder (index.html + news.json)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
